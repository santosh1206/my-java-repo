<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Website</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 2px solid #ddd;
        }
        main {
            padding: 2rem 0;
        }
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Static Site</h1>
        <p>Deployed via GitHub Pages</p>
    </header>

    <main>
        <div class="card">
            <h2>About This Project</h2>
            <p>This is a simple static HTML page hosted on GitHub. You can edit this file to add your own content, images, and links.</p>
            <p><strong>Next steps:</strong> Start adding your own personality to this code!</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 - My Personal Project</p>
    </footer>

</body>
</html>
